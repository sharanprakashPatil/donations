{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Portal</title>
    <!-- Use the static file link for the external css -->
    <link rel="stylesheet" href="{% static 'css/admin.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-container">
                <div class="logo">
                    <!-- Shield check icon to signify admin -->
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-shield-check"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="m9 12 2 2 4-4"/></svg>
                </div>
                <h2>Admin Access</h2>
                <p>Enter your credentials to manage the platform</p>
            </div>
            
            <form id="adminLoginForm" method="POST" action="{% url 'admin_login' %}">
                {% csrf_token %}
                <div class="input-group">
                    <label for="adminId">Admin ID</label>
                    <div class="input-wrapper">
                        <!-- User icon -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-user"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        <input type="text" id="adminId" name="adminId" placeholder="Enter your Admin ID" required>
                    </div>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <!-- Lock icon -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-lock"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    </div>
                </div>
                
                {% if error %}
                <div class="error-message" style="display: block;">{{ error }}</div>
                {% endif %}
                <button type="submit" class="submit-btn">Secure Login</button>
            </form>
        </div>
    </div>

    <!-- Client-side Logic to handle login criteria as requested -->
    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
            const submitBtn = document.querySelector('.submit-btn');
            
            // Visual feedback during authentication
            submitBtn.innerHTML = 'Authenticating...';
            submitBtn.style.opacity = '0.8';
            // The form will immediately submit POST to Django backend
        });
    </script>
</body>
</html>
